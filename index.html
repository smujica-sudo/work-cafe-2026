    <meta name="theme-color" content="#141414">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <title>Work Café Santander | Ficha Técnica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- IDENTIDAD CORPORATIVA (DARK MODE) --- */
        @font-face { font-family: 'SantanderText'; src: local('Arial'); font-weight: 400; }
        @font-face { font-family: 'SantanderHeadline'; src: local('Arial Black'); font-weight: 700; }

        :root {
            --s-red: #ec0000;      
            --s-dark: #141414;     
            --s-white: #ffffff;    
            --s-accent: #deedf2;   
            --s-border: #333333;
            --led-green: #248a3d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background-color: var(--s-dark); 
            color: var(--s-white); 
            font-family: 'SantanderText', Arial, sans-serif;
            width: 100%; height: 100vh;
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--s-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease, visibility 0.5s;
        }
        .coffee-loader {
            width: 80px; height: 80px; margin-bottom: 20px;
            fill: var(--s-red);
            animation: spin 2s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }
        #status-text { 
            font-family: 'SantanderHeadline'; font-size: 0.8rem; 
            letter-spacing: 3px; text-transform: uppercase; 
            color: var(--s-white); opacity: 0.8; 
        }

        /* --- DASHBOARD --- */
        .dashboard-container { 
            width: 95%; max-width: 1400px; margin: 0 auto; 
            padding: 2vh 0; display: flex; flex-direction: column; gap: 2vh; 
            height: 100vh; justify-content: center;
        }

        /* CABECERA */
        .header-section { 
            display: grid; grid-template-columns: 140px 1fr auto; align-items: center;
            border-bottom: 1px solid var(--s-border); padding-bottom: 2vh; gap: 30px;
        }
        .logo-box img { width: 100%; height: auto; }
        
        .profile-box { text-align: center; }
        .review-text { font-size: 1rem; line-height: 1.6; color: var(--s-white); font-style: italic; max-width: 800px; margin: 0 auto; }
        .tags-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .tag { border: 1px solid var(--s-red); color: var(--s-white); padding: 4px 12px; border-radius: 2px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        .score-box { display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
        .score-info { text-align: right; }
        .score-info .val { font-family: 'SantanderHeadline'; font-size: 2.8rem; font-weight: 700; color: var(--s-red); line-height: 1; }
        .score-info .lbl { font-size: 0.75rem; color: var(--s-accent); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        
        .btn-pdf { 
            background: #222; color: #FFF; width: 55px; height: 55px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 1px solid var(--s-border); 
            cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        .btn-pdf:hover { background: var(--s-red); transform: translateY(-3px); border-color: transparent; }

        /* --- CUERPO --- */
        .main-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; align-items: start; }
        .col h2 { 
            font-family: 'SantanderHeadline'; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; 
            padding-bottom: 8px; border-bottom: 1px solid var(--s-border);
        }
        .col h2::before { content: ''; width: 4px; height: 16px; background: var(--s-red); }
        
        .data-list .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .data-list .item:last-child { border-bottom: none; }
        .data-list .label { color: var(--s-accent); font-size: 0.85rem; }
        .data-list .value { font-weight: 600; color: var(--s-white); font-size: 0.95rem; text-align: right; }

        .chart-box { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 15px; height: 320px; }
        .pie-box { height: 210px; }
