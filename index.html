<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Work Café Santander | Ficha Técnica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- IDENTIDAD CORPORATIVA --- */
        @font-face { font-family: 'SantanderText'; src: local('Arial'); font-weight: 400; }
        @font-face { font-family: 'SantanderHeadline'; src: local('Arial Black'); font-weight: 700; }

        :root {
            --s-red: #ec0000;      /* Rojo Oficial */
            --s-dark: #141414;     /* Negro Plano */
            --s-white: #ffffff;    /* Blanco Puro */
            --s-accent: #deedf2;   /* Celeste Acento */
            --s-border: #333333;
            --led-green: #248a3d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            background-color: var(--s-dark); 
            color: var(--s-white); 
            font-family: 'SantanderText', Arial, sans-serif;
            width: 100%; height: 100vh;
            overflow: hidden; 
        }

        /* --- PRELOADER (GRANO DE CAFÉ) --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--s-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .bean-icon {
            width: 80px; height: 80px; fill: var(--s-red);
            animation: spin-bean 2s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }
        @keyframes spin-bean {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        #status-text { margin-top: 20px; font-family: 'SantanderHeadline'; font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; color: var(--s-white); opacity: 0.8; }

        /* --- DASHBOARD COMPACTO --- */
        .dashboard-container { 
            width: 95%; max-width: 1400px; margin: 0 auto; 
            padding: 2vh 0; display: flex; flex-direction: column; gap: 2vh; 
            height: 100vh; justify-content: center;
        }

        .header-section { 
            display: grid; grid-template-columns: 140px 1fr 140px; align-items: center;
            border-bottom: 1px solid var(--s-border); padding-bottom: 2vh; gap: 30px;
        }
        .logo-box img { width: 100%; height: auto; }
        .profile-box { text-align: center; }
        .review-text { font-size: 1rem; line-height: 1.6; color: var(--s-white); font-style: italic; max-width: 800px; margin: 0 auto; }
        .tags-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .tag { border: 1px solid var(--s-red); color: var(--s-white); padding: 4px 12px; border-radius: 2px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }

        .score-box { text-align: right; }
        .score-box .val { font-family: 'SantanderHeadline'; font-size: 2.8rem; font-weight: 700; color: var(--s-red); line-height: 1; }
        .score-box .lbl { font-size: 0.75rem; color: var(--s-accent); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }

        /* CUERPO TÉCNICO */
        .main-content { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; align-items: start; }
        .col h2 { 
            font-family: 'SantanderHeadline'; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; 
            padding-bottom: 10px; border-bottom: 1px solid var(--s-border);
        }
        .col h2::before { content: ''; width: 4px; height: 16px; background: var(--s-red); }
        
        .data-list .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .data-list .label { color: var(--s-accent); font-size: 0.85rem; }
        .data-list .value { font-weight: 600; color: var(--s-white); font-size: 0.95rem; }

        /* GRÁFICOS */
        .chart-box { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 15px; height: 320px; }
        .pie-box { height: 240px; }

        /* UI INDICADORES */
        .sync-led { position: fixed; bottom: 20px; left: 20px; width: 10px; height: 10px; border-radius: 50%; background-color: var(--led-green); z-index: 1000; animation: led-breathe 3s infinite; }
        @keyframes led-breathe { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } }
        
        .btn-pdf { position: fixed; bottom: 25px; right: 25px; background: #222; color: #FFF; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,0,0,0.6); border: 1px solid var(--s-border); z-index: 1000; cursor: pointer; transition: 0.3s; }
        .btn-pdf:hover { background: var(--s-red); transform: translateY(-3px); border-color: transparent; }

        /* RESPONSIVE MÓVIL */
        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .dashboard-container { height: auto; padding: 30px 20px; }
            .header-section { grid-template-columns: 1fr; text-align: center; gap: 20px; }
            .main-content { grid-template-columns: 1fr; gap: 50px; }
            .score-box { text-align: center; order: -1; }
            .chart-box { height: 400px; }
        }

        /* --- CLASE ACTIVA DURANTE LA GENERACIÓN DEL PDF --- */
        body.pdf-export-mode { overflow: visible !important; }
        body.pdf-export-mode .dashboard-container {
            width: 1600px !important; max-width: 1600px !important;
            height: 1100px !important;
            padding: 60px !important;
            background-color: var(--s-dark);
            justify-content: flex-start;
            gap: 50px;
        }
        body.pdf-export-mode .header-section { grid-template-columns: 140px 1fr 140px; text-align: left; }
        body.pdf-export-mode .score-box { text-align: right; order: unset; }
        body.pdf-export-mode .main-content { grid-template-columns: repeat(3, 1fr); gap: 60px; }
        body.pdf-export-mode .chart-box { height: 420px; }
        body.pdf-export-mode .pie-box { height: 320px; }
        body.pdf-export-mode .btn-pdf, body.pdf-export-mode .sync-led { display: none !important; }
    </style>
</head>
<body>

<div id="preloader">
    <svg class="bean-icon" viewBox="0 0 100 100">
        <path d="M50,10 C30,10 15,25 15,50 C15,75 30,90 50,90 C70,90 85,75 85,50 C85,25 70,10 50,10 Z" fill-opacity="0.1"/>
        <path d="M50,12 C44,25 44,75 50,88" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
        <path d="M35,50 Q50,42 65,50" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
    </svg>
    <p id="status-text">Sincronizando</p>
</div>

<div class="sync-led" id="sync-led"></div>

<div id="export-area" class="dashboard-container">
    <header class="header-section">
        <div class="logo-box"><img src="logo-workcafe.png" alt="Santander Work Café" onerror="this.style.display='none'"></div>
        <div class="profile-box">
            <p class="review-text" id="ui-review-text">---</p>
            <div class="tags-box" id="ui-tags"></div>
        </div>
        <div class="score-box">
            <div class="lbl">SCA SCORE</div>
            <div class="val" id="ui-sca">--.-</div>
        </div>
    </header>

    <main class="main-content">
        <section class="col">
            <h2>Evaluación Sensorial</h2>
            <div class="chart-box"><canvas id="radarChart"></canvas></div>
        </section>

        <section class="col">
            <h2>Trazabilidad</h2>
            <div class="data-list">
                <div class="item"><div class="label">Lote</div><div class="value" id="ui-lote">---</div></div>
                <div class="item"><div class="label">Origen / Región</div><div class="value" id="ui-origen">---</div></div>
                <div class="item"><div class="label">Altitud</div><div class="value" id="ui-altitud">---</div></div>
                <div class="item"><div class="label">Productor</div><div class="value" id="ui-productor">---</div></div>
                <div class="item"><div class="label">Varietales</div><div class="value" id="ui-varietales">---</div></div>
                <div class="item"><div class="label">Proceso</div><div class="value" id="ui-proceso">---</div></div>
                <div class="item"><div class="label">Certificaciones</div><div class="value" id="ui-cert" style="color:var(--s-red)">---</div></div>
            </div>
        </section>

        <section class="col">
            <h2>Análisis Físico</h2>
            <div class="chart-box pie-box"><canvas id="pieChart"></canvas></div>
            <div class="data-list">
                <div class="item"><div class="label">Humedad</div><div class="value" id="ui-humedad">--%</div></div>
                <div class="item"><div class="label">Densidad</div><div class="value" id="ui-densidad">-.-- g/ml</div></div>
                <div class="item"><div class="label">Agtron Gourmet</div><div class="value" id="ui-agtron">--</div></div>
            </div>
        </section>
    </main>
</div>

<button class="btn-pdf" onclick="downloadPDF()" title="Descargar Ficha">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
</button>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzKdYQ52XHZt5o7iph5yKK0iB4SwHW6ICElOleMIuI-xF47G4stD1V4ypKSFdHCgZvd6g/exec";

    Chart.defaults.color = '#888';
    Chart.defaults.font.family = 'SantanderText, Arial';

    const radarChart = new Chart(document.getElementById('radarChart'), {
        type: 'radar',
        data: {
            labels: ['Fragancia', 'Sabor', 'Residual', 'Acidez', 'Cuerpo', 'Balance', 'Dulzor'],
            datasets: [{ data:[0,0,0,0,0,0,0], backgroundColor:'rgba(236, 0, 0, 0.12)', borderColor:'#ec0000', borderWidth:2, pointRadius:4, pointBackgroundColor: '#141414' }]
        },
        options: { 
            animation: false, responsive: true, maintainAspectRatio: false,
            scales: { r: { angleLines: {color:'#333'}, grid: {color:'#333'}, pointLabels: {color:'#FFF', font:{size:13, weight:600}, padding:15}, ticks: {display:false}, min:6, max:10 } },
            plugins: { legend: {display:false} }
        }
    });

    const pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: {
            labels: ['Malla 17', 'Malla 16', 'Malla 15'],
            datasets: [{ data:[1,1,1], backgroundColor:['rgba(236, 0, 0, 1.0)', 'rgba(236, 0, 0, 0.6)', 'rgba(236, 0, 0, 0.3)'], borderColor:'#141414', borderWidth:4 }]
        },
        options: { animation: false, responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: {position:'bottom', labels:{padding:15, color:'#888', font:{size:11}}} } }
    });

    function render(data) {
        if(!data) return;
        document.getElementById('ui-sca').innerText = data.sca_total;
        document.getElementById('ui-lote').innerText = data.lote;
        document.getElementById('ui-review-text').innerText = data.review.texto !== "—" ? `"${data.review.texto}"` : "Cargando...";
        
        const tagContainer = document.getElementById('ui-tags'); tagContainer.innerHTML = '';
        if(data.review.notas !== "—") {
            data.review.notas.split(',').forEach(n => {
                const el = document.createElement('span'); el.className = 'tag'; el.innerText = n.trim(); tagContainer.appendChild(el);
            });
        }

        radarChart.data.datasets[0].data = data.sensorial; radarChart.update();
        document.getElementById('ui-origen').innerText = `${data.trazabilidad.origen} / ${data.trazabilidad.region}`;
        document.getElementById('ui-altitud').innerText = data.trazabilidad.altitud;
        document.getElementById('ui-productor').innerText = data.trazabilidad.productor;
        document.getElementById('ui-varietales').innerText = data.trazabilidad.varietales;
        document.getElementById('ui-proceso').innerText = data.trazabilidad.proceso;
        document.getElementById('ui-cert').innerText = data.trazabilidad.certificaciones;

        document.getElementById('ui-humedad').innerText = String(data.fisico.humedad).replace('%','') + '%';
        document.getElementById('ui-densidad').innerText = String(data.fisico.densidad).replace('g/ml','').trim() + ' g/ml';
        document.getElementById('ui-agtron').innerText = data.fisico.agtron;

        pieChart.data.datasets[0].data = [parseFloat(data.fisico.malla17)||0, parseFloat(data.fisico.malla16)||0, parseFloat(data.fisico.malla15)||0];
        pieChart.update();
    }

    async function bootstrap() {
        const cache = localStorage.getItem('santander_cafe_cache_stable');
        if(cache) {
            render(JSON.parse(cache));
            document.getElementById('preloader').style.display = 'none';
        }

        try {
            const res = await fetch(API_URL);
            const fresh = await res.json();
            render(fresh);
            localStorage.setItem('santander_cafe_cache_stable', JSON.stringify(fresh));
            document.getElementById('sync-led').style.backgroundColor = 'var(--led-green)';
            document.getElementById('preloader').style.display = 'none';
        } catch (e) {
            document.getElementById('sync-led').style.backgroundColor = 'var(--s-red)';
            if(!cache) document.getElementById('status-text').innerText = "Modo Offline";
        }
    }

    // --- DESCARGA PDF 100% FUNCIONAL ---
    async function downloadPDF() {
        const loader = document.getElementById('preloader');
        const statusText = document.getElementById('status-text');
        const targetElement = document.getElementById('export-area');

        // 1. Mostrar pantalla de carga
        statusText.innerText = "Generando PDF Alta Calidad...";
        loader.style.display = 'flex';
        
        // Pequeña pausa para asegurar que el navegador pinta la pantalla de carga
        await new Promise(resolve => setTimeout(resolve, 300));

        // 2. Aplicar estilos de PDF al DOM real temporalmente
        document.body.classList.add('pdf-export-mode');

        // Redimensionar gráficos al nuevo tamaño del contenedor (1600px)
        radarChart.resize();
        pieChart.resize();
        
        // Esperar a que Chart.js aplique el resize visualmente
        await new Promise(resolve => setTimeout(resolve, 500));

        // 3. Convertir gráficos Canvas a etiquetas Img temporalmente 
        // (html2canvas a veces omite Canvas en algunas resoluciones)
        const radarCanvas = document.getElementById('radarChart');
        const pieCanvas = document.getElementById('pieChart');
        
        const radarImg = document.createElement('img');
        radarImg.src = radarChart.toDataURL('image/png', 1.0);
        radarImg.style.width = '100%';
        
        const pieImg = document.createElement('img');
        pieImg.src = pieChart.toDataURL('image/png', 1.0);
        pieImg.style.width = '100%';

        radarCanvas.style.display = 'none';
        pieCanvas.style.display = 'none';
        
        radarCanvas.parentNode.appendChild(radarImg);
        pieCanvas.parentNode.appendChild(pieImg);

        // 4. Configuración del PDF
        const opt = {
            margin: 0,
            filename: 'WorkCafe_Santander_Ficha.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { 
                scale: 1, 
                backgroundColor: '#141414', 
                useCORS: true,
                width: 1600,
                height: 1100,
                windowWidth: 1600, // Fuerza la resolución de escritorio en html2canvas
                windowHeight: 1100
            },
            jsPDF: { unit: 'px', format: [1600, 1100], orientation: 'landscape' }
        };

        try {
            // 5. Generar PDF
            await html2pdf().set(opt).from(targetElement).save();
        } catch (error) {
            console.error("Error generando PDF:", error);
        } finally {
            // 6. Restaurar el DOM a la normalidad
            radarImg.remove();
            pieImg.remove();
            radarCanvas.style.display = 'block';
            pieCanvas.style.display = 'block';
            
            document.body.classList.remove('pdf-export-mode');
            radarChart.resize();
            pieChart.resize();

            // Ocultar Preloader
            loader.style.display = 'none';
        }
    }

    window.onload = bootstrap;
</script>
</body>
</html>
