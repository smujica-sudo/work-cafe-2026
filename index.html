<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <title>Work Café Santander | Ficha Técnica</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --santander-red: #EC0000; 
            --bg-dark: #141414; 
            --text-light: #F0F0F0;
            --text-muted: #999999;
            --border-color: rgba(255, 255, 255, 0.12);
            --led-green: #28a745;
            --led-red: #dc3545;
        }

        /* --- RESET Y PARALLAX SETTINGS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; width: 100%; height: 100%; overflow-x: hidden; }

        body {
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); color: var(--text-light); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
            position: relative; overflow-x: hidden;
        }

        /* Fondo Parallax Mejorado */
        .parallax-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 120%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(236, 0, 0, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(236, 0, 0, 0.03) 0%, transparent 40%);
            z-index: -1; transform: translateZ(0);
            transition: transform 0.1s ease-out;
        }

        .dashboard-container {
            width: 95%; max-width: 1600px; margin: 0 auto;
            padding: 40px 10px; display: flex; flex-direction: column; gap: 40px; 
            position: relative; z-index: 1;
        }

        /* --- HEADER --- */
        .hero-section {
            display: flex; flex-direction: column; gap: 30px; 
            text-align: center; border-bottom: 1px solid var(--border-color); 
            padding-bottom: 40px;
        }

        .logo-container { margin: 0 auto; max-width: 150px; transition: transform 0.3s ease; }
        .logo-container:hover { transform: scale(1.05); }
        .logo-img { width: 100%; height: auto; filter: brightness(1.1); }

        .header-review { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .review-text { font-size: 1.1rem; line-height: 1.8; color: #EEE; font-style: italic; max-width: 900px; text-wrap: balance; }
        
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .tag { 
            border: 1px solid var(--santander-red); color: #FFF; 
            background-color: transparent; padding: 6px 16px; 
            border-radius: 4px; font-size: 0.8rem; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; cursor: default;
        }
        .tag:hover { background: var(--santander-red); box-shadow: 0 0 15px var(--santander-red); }

        /* --- SCORE SCA (MÁS PEQUEÑO Y FINO) --- */
        .score-box { text-align: center; }
        .score-box .val { 
            font-size: 3.8rem; 
            font-weight: 600; 
            color: var(--santander-red); 
            line-height: 1; 
            letter-spacing: -1px;
        }
        .score-box .lbl { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-top: 5px; letter-spacing: 2px; }

        /* --- TABLAS INTERACTIVAS --- */
        .section-container h2 { 
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 25px; color: var(--text-light); 
            display: flex; align-items: center; gap: 12px; padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }
        .section-container h2::before { content: ''; width: 4px; height: 20px; background: var(--santander-red); }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table .row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: background 0.3s ease, padding-left 0.3s ease;
            border-radius: 4px;
        }
        .data-table .row:hover { 
            background: rgba(236, 0, 0, 0.05); 
            padding-left: 15px;
            border-bottom-color: var(--santander-red);
        }
        .data-table .label { color: var(--text-muted); font-size: 0.95rem; }
        .data-table .value { font-weight: 600; color: var(--text-light); font-size: 1.1rem; text-align: right; }

        /* --- GRÁFICOS --- */
        .chart-wrapper { position: relative; width: 100%; display: flex; justify-content: center; margin-bottom: 30px; transition: transform 0.4s ease; }
        .chart-wrapper:hover { transform: scale(1.02); }
        .radar-wrapper { height: 450px; } 
        .pie-wrapper { height: 300px; }

        /* --- BOTONES Y LED --- */
        .fab-pdf { 
            position: fixed; bottom: 30px; right: 30px; background: #1A1A1A; 
            color: #FFF; width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.6); border: 1px solid #333; 
            z-index: 1000; cursor: pointer; transition: all 0.3s ease;
        }
        .fab-pdf:hover { background: var(--santander-red); border-color: var(--santander-red); transform: translateY(-5px); }

        /* LED Pulsatorio abajo izquierda */
        .sync-led {
            position: fixed; bottom: 25px; left: 25px; width: 14px; height: 14px;
            border-radius: 50%; background-color: var(--led-green);
            box-shadow: 0 0 10px var(--led-green);
            z-index: 1000;
            animation: pulse-green 2s infinite;
        }
        .sync-led.offline { 
            background-color: var(--led-red); 
            box-shadow: 0 0 10px var(--led-red);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(40, 167, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- DESKTOP --- */
        @media (min-width: 1024px) {
            .dashboard-container { display: grid; grid-template-columns: repeat(3, 1fr); padding: 80px 40px; gap: 60px; }
            .hero-section { grid-column: 1 / 4; display: grid; grid-template-columns: 1fr 2.5fr 1fr; align-items: center; text-align: left; gap: 50px; }
            .logo-container { margin: 0; } .header-review { align-items: flex-start; } .tags { justify-content: flex-start; }
            .score-box { text-align: right; border-left: 2px solid var(--border-color); padding-left: 40px; }
            .sensory-section { grid-column: 1 / 2; } .trace-section { grid-column: 2 / 3; } .physic-section { grid-column: 3 / 4; }
        }

        .pdf-export-mode { width: 1600px !important; background: var(--bg-dark) !important; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; }
        .pdf-export-mode .sync-led, .pdf-export-mode .fab-pdf { display: none !important; }
    </style>
</head>
<body>

<div class="parallax-wrapper" id="parallax-bg"></div>

<div id="sync-led" class="sync-led" title="Estado de conexión"></div>

<div id="export-area" class="dashboard-container">
    
    <header class="section-container hero-section reveal active">
        <div class="logo-container">
            <img src="logo-workcafe.png" alt="Work Café" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="logo-text" style="display: none; font-weight: 700; font-size: 1.2rem;">WORK CAFÉ</div>
        </div>

        <div class="header-review">
            <p class="review-text" id="val-review-text">Cargando perfil...</p>
            <div class="tags" id="val-tags"></div>
        </div>

        <div class="score-box">
            <div class="lbl">SCA SCORE</div>
            <div class="val" id="ui-sca">--.-</div>
        </div>
    </header>

    <section class="section-container sensory-section reveal">
        <h2>Evaluación Sensorial</h2>
        <div class="chart-wrapper radar-wrapper">
            <canvas id="radarChart"></canvas>
        </div>
    </section>

    <section class="section-container trace-section reveal">
        <h2>Trazabilidad</h2>
        <div class="data-table">
            <div class="row"><div class="label">Lote</div><div class="value" id="val-lote">---</div></div>
            <div class="row"><div class="label">Origen</div><div class="value" id="val-ori">—</div></div>
            <div class="row"><div class="label">Región</div><div class="value" id="val-reg">—</div></div>
            <div class="row"><div class="label">Productor</div><div class="value" id="val-pro">—</div></div>
            <div class="row"><div class="label">Altitud</div><div class="value" id="val-alt">—</div></div>
            <div class="row"><div class="label">Varietales</div><div class="value" id="val-var">—</div></div>
            <div class="row"><div class="label">Proceso</div><div class="value" id="val-proc">—</div></div>
            <div class="row"><div class="label">Certificaciones</div><div class="value" id="val-cert" style="color:var(--santander-red);">—</div></div>
        </div>
    </section>

    <section class="section-container physic-section reveal">
        <h2>Análisis Físico</h2>
        <div class="chart-wrapper pie-wrapper">
            <canvas id="pieChart"></canvas>
        </div>
        <div class="data-table">
            <div class="row"><div class="label">Humedad</div><div class="value" id="val-hum">--%</div></div>
            <div class="row"><div class="label">Densidad</div><div class="value" id="val-den">-.-- g/ml</div></div>
            <div class="row"><div class="label">Agtron Gourmet</div><div class="value" id="val-agt">--</div></div>
        </div>
    </section>

</div>

<button class="fab-pdf reveal" onclick="exportPDF()" aria-label="Descargar PDF">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
</button>

<script>
    const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzKdYQ52XHZt5o7iph5yKK0iB4SwHW6ICElOleMIuI-xF47G4stD1V4ypKSFdHCgZvd6g/exec";

    // Configuración de Gráficos con Interactividad
    Chart.defaults.color = '#AAAAAA';
    Chart.defaults.font.family = 'Montserrat';
    Chart.defaults.plugins.tooltip.backgroundColor = 'rgba(20, 20, 20, 0.9)';
    Chart.defaults.plugins.tooltip.titleFont = { size: 14, weight: 'bold' };

    const ctxRadar = document.getElementById('radarChart').getContext('2d');
    const radarChart = new Chart(ctxRadar, {
        type: 'radar',
        data: {
            labels: ['Fragancia', 'Sabor', 'Residual', 'Acidez', 'Cuerpo', 'Balance', 'Dulzor'],
            datasets: [{ 
                label: 'Puntaje',
                data: [0,0,0,0,0,0,0],
                backgroundColor: 'rgba(236, 0, 0, 0.15)', borderColor: '#EC0000', borderWidth: 2, pointRadius: 4, hoverPointRadius: 8
            }]
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            scales: { r: { angleLines: { color: '#333' }, grid: { color: '#333' }, pointLabels: { color: '#FFF', font: { size: 12, weight: 600 }, padding: 20 }, ticks: { display: false }, min: 6, max: 10 } },
            plugins: { legend: { display: false } }
        }
    });

    const ctxPie = document.getElementById('pieChart').getContext('2d');
    const pieChart = new Chart(ctxPie, {
        type: 'doughnut',
        data: { 
            labels: ['Malla 17', 'Malla 16', 'Malla 15'], 
            datasets: [{ data: [1, 1, 1], backgroundColor: ['#EC0000', '#444', '#222'], borderColor: '#141414', borderWidth: 3 }] 
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom', labels: { padding: 20, color: '#CCC' } } } }
    });

    function updateUI(data) {
        if(!data) return;
        document.getElementById('ui-sca').innerText = data.sca_total;
        document.getElementById('val-lote').innerText = data.lote;
        document.getElementById('val-review-text').innerText = data.review.texto !== "—" ? `"${data.review.texto}"` : "Cargando perfil...";

        const tagsContainer = document.getElementById('val-tags');
        tagsContainer.innerHTML = '';
        if(data.review.notas !== "—") {
            data.review.notas.split(',').forEach(nota => {
                const span = document.createElement('span');
                span.className = 'tag'; span.innerText = nota.trim();
                tagsContainer.appendChild(span);
            });
        }

        radarChart.data.datasets[0].data = data.sensorial;
        radarChart.update();

        document.getElementById('val-ori').innerText = data.trazabilidad.origen;
        document.getElementById('val-reg').innerText = data.trazabilidad.region;
        document.getElementById('val-pro').innerText = data.trazabilidad.productor;
        document.getElementById('val-alt').innerText = data.trazabilidad.altitud;
        document.getElementById('val-var').innerText = data.trazabilidad.varietales;
        document.getElementById('val-proc').innerText = data.trazabilidad.proceso;
        document.getElementById('val-cert').innerText = data.trazabilidad.certificaciones;

        document.getElementById('val-hum').innerText = String(data.fisico.humedad).replace('%','') + '%';
        document.getElementById('val-den').innerText = String(data.fisico.densidad).replace('g/ml','').trim() + ' g/ml';
        document.getElementById('val-agt').innerText = data.fisico.agtron;

        let m17 = parseFloat(data.fisico.malla17) || 0; if (m17 > 0 && m17 <= 1) m17 *= 100;
        let m16 = parseFloat(data.fisico.malla16) || 0; if (m16 > 0 && m16 <= 1) m16 *= 100;
        let m15 = parseFloat(data.fisico.malla15) || 0; if (m15 > 0 && m15 <= 1) m15 *= 100;
        pieChart.data.datasets[0].data = [m17.toFixed(1), m16.toFixed(1), m15.toFixed(1)];
        pieChart.update();
    }

    async function syncData() {
        const cached = localStorage.getItem('cafe_v4');
        if (cached) updateUI(JSON.parse(cached));

        try {
            const response = await fetch(SHEET_API_URL);
            const data = await response.json();
            updateUI(data);
            localStorage.setItem('cafe_v4', JSON.stringify(data));
            document.getElementById('sync-led').classList.remove('offline');
        } catch (e) {
            document.getElementById('sync-led').classList.add('offline');
        }
    }

    // --- EFECTO PARALLAX REAL ---
    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        document.getElementById('parallax-bg').style.transform = `translateY(${scrolled * 0.3}px) translateZ(0)`;
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    function exportPDF() {
        const fab = document.querySelector('.fab-pdf');
        fab.style.display = 'none';
        const element = document.getElementById('export-area');
        element.classList.add('pdf-export-mode');
        radarChart.resize(); pieChart.resize();
        setTimeout(() => {
            html2pdf().set({ 
                margin: 0, filename: 'Ficha_WorkCafe_Santander.pdf', 
                image: { type: 'jpeg', quality: 1 }, 
                html2canvas: { scale: 2, backgroundColor: '#141414', useCORS: true }, 
                jsPDF: { unit: 'px', format: [1600, 1100], orientation: 'landscape' } 
            }).from(element).save().then(() => {
                element.classList.remove('pdf-export-mode');
                radarChart.resize(); pieChart.resize();
                fab.style.display = 'flex'; 
            });
        }, 300);
    }

    window.onload = syncData;
</script>
</body>
</html>
